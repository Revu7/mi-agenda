<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  :root {
    --cream: #f5f0e8;
    --ink: #1a1410;
    --rust: #c4572a;
    --gold: #d4a853;
    --sage: #7a9e7e;
    --paper: #faf7f2;
    --shadow: rgba(26,20,16,0.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--cream); font-family:'DM Sans',sans-serif; color:var(--ink); min-height:100vh; background-image: radial-gradient(ellipse at 20% 50%, rgba(196,87,42,0.06) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(212,168,83,0.08) 0%, transparent 50%); }

  #auth-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .auth-card { background:var(--paper); border:1px solid rgba(26,20,16,0.1); border-radius:20px; padding:40px 36px; width:100%; max-width:420px; box-shadow:0 8px 40px var(--shadow); animation:fadeUp 0.5s ease; }
  .auth-card .logo { text-align:center; margin-bottom:28px; }
  .auth-card .logo h1 { font-family:'Playfair Display',serif; font-size:2rem; }
  .auth-card .logo h1 em { color:var(--rust); font-style:italic; }
  .auth-card .logo p { font-size:13px; color:#999; margin-top:4px; }
  .auth-tabs { display:flex; border-bottom:1px solid rgba(26,20,16,0.1); margin-bottom:24px; }
  .auth-tab { flex:1; padding:10px; text-align:center; font-size:14px; cursor:pointer; border:none; background:none; font-family:'DM Sans',sans-serif; color:#aaa; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.2s; }
  .auth-tab.active { color:var(--rust); border-bottom-color:var(--rust); font-weight:500; }
  .auth-field { margin-bottom:14px; }
  .auth-field label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:#888; margin-bottom:5px; }
  .auth-field input { width:100%; padding:11px 14px; border:1.5px solid rgba(26,20,16,0.12); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--ink); background:white; outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
  .auth-field input:focus { border-color:var(--rust); box-shadow:0 0 0 3px rgba(196,87,42,0.1); }
  .remember-row { display:flex; align-items:center; gap:8px; margin-bottom:16px; cursor:pointer; }
  .remember-row input[type=checkbox] { width:16px; height:16px; accent-color:var(--rust); cursor:pointer; }
  .remember-row span { font-size:13px; color:#888; }
  .btn-primary { width:100%; padding:13px; background:var(--ink); color:white; border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; transition:background 0.2s,transform 0.1s; margin-top:6px; }
  .btn-primary:hover { background:var(--rust); }
  .btn-primary:active { transform:scale(0.98); }
  .btn-primary:disabled { opacity:0.6; cursor:not-allowed; }
  .auth-error { background:rgba(196,87,42,0.1); border:1px solid rgba(196,87,42,0.3); color:var(--rust); border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:14px; display:none; }
  .auth-success { background:rgba(122,158,126,0.1); border:1px solid rgba(122,158,126,0.3); color:var(--sage); border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:14px; display:none; }

  #app-screen { display:none; }
  .container { max-width:780px; margin:0 auto; padding:40px 24px 80px; }
  header { text-align:center; margin-bottom:36px; animation:fadeDown 0.6s ease; }
  header .eyebrow { font-size:11px; letter-spacing:0.25em; text-transform:uppercase; color:var(--rust); font-weight:500; margin-bottom:8px; }
  header h1 { font-family:'Playfair Display',serif; font-size:clamp(2.2rem,5vw,3.2rem); font-weight:700; line-height:1.1; }
  header h1 em { font-style:italic; color:var(--rust); }
  .date-strip { font-size:13px; color:#888; margin-top:10px; font-weight:300; }
  .header-bar { display:flex; justify-content:flex-end; margin-bottom:8px; }
  .user-info { font-size:12px; color:#aaa; display:flex; align-items:center; gap:8px; }
  .btn-logout { font-size:12px; color:#aaa; background:none; border:1px solid rgba(26,20,16,0.15); border-radius:6px; padding:4px 10px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.15s; }
  .btn-logout:hover { color:var(--rust); border-color:var(--rust); }

  .view-tabs { display:flex; gap:4px; margin-bottom:28px; background:white; border-radius:12px; padding:4px; border:1px solid rgba(26,20,16,0.08); box-shadow:0 2px 12px var(--shadow); }
  .view-tab { flex:1; padding:10px 8px; text-align:center; font-size:13px; cursor:pointer; border:none; background:none; font-family:'DM Sans',sans-serif; color:#aaa; border-radius:8px; transition:all 0.2s; font-weight:500; }
  .view-tab.active { background:var(--ink); color:white; }

  .calendar-card { background:var(--paper); border:1px solid rgba(26,20,16,0.1); border-radius:16px; padding:24px; margin-bottom:28px; box-shadow:0 4px 24px var(--shadow); }
  .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .cal-title { font-family:'Playfair Display',serif; font-size:1.2rem; }
  .cal-nav { background:none; border:1px solid rgba(26,20,16,0.15); border-radius:8px; padding:6px 14px; cursor:pointer; font-size:18px; transition:all 0.15s; line-height:1; }
  .cal-nav:hover { background:var(--rust); color:white; border-color:var(--rust); }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
  .cal-day-name { text-align:center; font-size:11px; color:#aaa; font-weight:500; text-transform:uppercase; padding:4px 0 10px; }
  .cal-day { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:8px; cursor:pointer; transition:all 0.15s; position:relative; font-size:13px; gap:3px; }
  .cal-day:hover:not(.other-month) { background:rgba(196,87,42,0.1); }
  .cal-day.today { background:var(--rust); color:white; font-weight:700; }
  .cal-day.other-month { color:#ddd; cursor:default; }
  .cal-day.selected:not(.today) { background:var(--ink); color:white; }
  .cal-dot { width:5px; height:5px; border-radius:50%; background:var(--rust); flex-shrink:0; }
  .cal-day.today .cal-dot { background:rgba(255,255,255,0.85); }
  .cal-day.selected:not(.today) .cal-dot { background:var(--gold); }
  .cal-events-day { margin-top:20px; padding-top:16px; border-top:1px solid rgba(26,20,16,0.08); }
  .cal-events-day-title { font-size:12px; color:#aaa; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:12px; font-weight:500; }

  .add-card { background:var(--paper); border:1px solid rgba(26,20,16,0.1); border-radius:16px; padding:28px; margin-bottom:36px; box-shadow:0 4px 24px var(--shadow); }
  .add-card h2 { font-family:'Playfair Display',serif; font-size:1.1rem; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
  .add-card h2::before { content:'+'; width:24px; height:24px; background:var(--rust); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
  .form-row.full { grid-template-columns:1fr; }
  label { display:block; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#888; margin-bottom:5px; font-weight:500; }
  input[type=text], input[type=date], input[type=time], textarea { width:100%; padding:10px 14px; border:1.5px solid rgba(26,20,16,0.12); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--ink); background:white; outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
  input:focus, textarea:focus { border-color:var(--rust); box-shadow:0 0 0 3px rgba(196,87,42,0.1); }
  textarea { resize:vertical; min-height:64px; }
  .category-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .cat-btn { padding:5px 14px; border-radius:20px; border:1.5px solid rgba(26,20,16,0.15); background:white; font-size:12px; cursor:pointer; transition:all 0.18s; font-family:'DM Sans',sans-serif; color:var(--ink); }
  .cat-btn.active,.cat-btn:hover { border-color:var(--rust); background:var(--rust); color:white; }
  .btn-add { width:100%; padding:12px; background:var(--ink); color:white; border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; transition:background 0.2s,transform 0.1s; }
  .btn-add:hover { background:var(--rust); }
  .btn-add:active { transform:scale(0.98); }
  .btn-add:disabled { opacity:0.6; cursor:not-allowed; }

  .section-title { font-family:'Playfair Display',serif; font-size:1.3rem; margin-bottom:16px; display:flex; align-items:baseline; gap:10px; }
  .count-badge { font-family:'DM Sans',sans-serif; font-size:12px; background:var(--ink); color:white; border-radius:20px; padding:2px 10px; font-weight:400; }
  .filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
  .filter-btn { padding:4px 12px; border-radius:16px; border:1px solid rgba(26,20,16,0.2); background:transparent; font-size:12px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.15s; }
  .filter-btn.active { background:var(--ink); color:white; border-color:var(--ink); }

  .empty-state { text-align:center; padding:60px 20px; color:#aaa; font-size:14px; }
  .empty-state .icon { font-size:3rem; margin-bottom:12px; }
  .day-group { margin-bottom:28px; }
  .day-label { font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:#999; font-weight:500; margin-bottom:10px; padding-left:4px; display:flex; align-items:center; gap:8px; }
  .day-label::after { content:''; flex:1; height:1px; background:rgba(26,20,16,0.08); }
  .day-label.today-label { color:var(--rust); font-weight:600; }

  .event-card { background:white; border:1px solid rgba(26,20,16,0.08); border-radius:12px; padding:16px 18px; margin-bottom:8px; display:flex; align-items:flex-start; gap:14px; transition:box-shadow 0.2s,transform 0.15s; position:relative; overflow:hidden; }
  .event-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:12px 0 0 12px; }
  .event-card.cat-gestion::before { background:var(--rust); }
  .event-card.cat-medico::before { background:#5ba4cf; }
  .event-card.cat-personal::before { background:var(--sage); }
  .event-card.cat-trabajo::before { background:var(--gold); }
  .event-card.cat-otro::before { background:#b0a0ff; }
  .event-card:hover { box-shadow:0 4px 20px var(--shadow); transform:translateY(-1px); }
  .event-card.done { opacity:0.5; }
  .event-card.done .event-title { text-decoration:line-through; }
  .check-btn { width:22px; height:22px; border-radius:50%; border:2px solid rgba(26,20,16,0.2); background:transparent; cursor:pointer; flex-shrink:0; margin-top:1px; transition:all 0.2s; display:flex; align-items:center; justify-content:center; font-size:12px; color:transparent; }
  .event-card.done .check-btn { background:var(--sage); border-color:var(--sage); color:white; }
  .check-btn:hover { border-color:var(--sage); color:var(--sage); }
  .event-body { flex:1; min-width:0; }
  .event-title { font-size:15px; font-weight:500; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .event-meta { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .event-time { font-size:12px; color:var(--rust); font-weight:500; }
  .event-cat { font-size:11px; color:#aaa; text-transform:uppercase; letter-spacing:0.08em; }
  .event-note { font-size:12px; color:#888; margin-top:4px; font-style:italic; }
  .delete-btn { background:none; border:none; cursor:pointer; color:#ccc; font-size:16px; padding:2px 4px; border-radius:4px; transition:color 0.15s,background 0.15s; flex-shrink:0; }
  .delete-btn:hover { color:#e05555; background:rgba(224,85,85,0.08); }

  /* ── AI CARD ── */
  .ai-card { background:linear-gradient(135deg,#1a1410 0%,#2d1f14 100%); border-radius:16px; padding:24px; margin-bottom:28px; box-shadow:0 4px 24 rgba(196,87,42,0.2); color:white; }
  .ai-card-title { font-family:'Playfair Display',serif; font-size:1.1rem; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
  .ai-card-sub { font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:16px; }
  .ai-input-row { display:flex; gap:10px; }
  .ai-input { flex:1; padding:12px 16px; border:1.5px solid rgba(255,255,255,0.15); border-radius:10px; background:rgba(255,255,255,0.08); color:white; font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s; }
  .ai-input::placeholder { color:rgba(255,255,255,0.35); }
  .ai-input:focus { border-color:var(--rust); }
  .ai-btn { padding:12px 20px; background:var(--rust); color:white; border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  .ai-btn:hover
